name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Fixes"
    labels:
      - bug
      - fix
  - title: "🧰 Chores"
    labels:
      - chore
      - maintenance
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
template: |
  ## What's Changed

  $CHANGES

  _This release was drafted automatically._
